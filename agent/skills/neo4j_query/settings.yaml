### ==================== LLM 配置 ====================
completion_models:
  default_completion_model:
    model_provider: openai
    model: qwen3.5-flash
    api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY}
    request_timeout: 120.0  # 👈 添加超时设置
    max_retries: 3
    retry:
      type: exponential_backoff

embedding_models:
  default_embedding_model:
    model_provider: openai
    model: text-embedding-v4
    api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY}
    request_timeout: 60.0
    max_retries: 3
    retry:
      type: exponential_backoff
    dimensions: 256
    call_args:
      encoding_format: float



### ==================== 输入输出配置 ====================
input:
  type: text
  base_dir: "input"  # 👈 修复：添加引号

output:
  type: neo4j
  base_dir: "output"  # 👈 修复：添加 base_dir
  config:
    uri: bolt://localhost:7687
    username: neo4j
    password: password123
    database: neo4j
    batch_size: 1000

### ==================== 存储配置 ====================
input_storage:
  type: file
  base_dir: "input"

output_storage:
  type: file
  base_dir: "output"

reporting:
  type: file
  base_dir: "logs"

### ==================== 缓存配置（修复）====================
cache:
  type: json  # 👈 改为 json，不要用 file
  base_dir: "cache"  # 👈 存储路径

### ==================== 向量存储配置 ====================
### ==================== 向量存储配置 ====================
vector_store:
  type: lancedb
  db_uri: "output/lancedb"
  vector_size: 256


### ==================== 文本分块配置 ====================
chunking:
  type: tokens
  chunk_size: 1200  # 👈 修复：使用 chunk_size
  chunk_overlap: 100  # 👈 修复：使用 chunk_overlap
  encoding_name: "cl100k_base"  # 👈 修复：使用 encoding_name

### ==================== 工作流配置 ====================
embed_text:
  embedding_model_id: default_embedding_model
  batch_size: 8  #目前使用的千问系列的嵌入式模型一次最多使用10条数据进行向量化

extract_graph:
  completion_model_id: default_completion_model
  prompt: "prompts/extract_graph.txt"
  entity_types:
    - person
    - organization
    - geo
    - event
    - object
    - food
  max_gleanings: 0
  strategy:
    type: "native"

summarize_descriptions:
  completion_model_id: default_completion_model
  prompt: "prompts/summarize_descriptions.txt"
  max_length: 500

cluster_graph:
  max_cluster_size: 10
  use_lcc: true
  seed: 3735928559
  resolution: 0.8  # 👈 新增：控制社区粒度

extract_claims:
  enabled: false
  completion_model_id: default_completion_model
  prompt: "prompts/extract_claims.txt"
  description: "Any claims or facts that could be relevant to information discovery."
  max_gleanings: 1

### ==================== 社区报告配置（修复版）====================
### ==================== 社区报告配置（修复版）====================
community_reports:
  completion_model_id: default_completion_model
  graph_prompt: "prompts/community_report_graph.txt"
  text_prompt: "prompts/community_report_text.txt"
  max_length: 1500  # 👈 增加长度
  max_input_length: 8000
  concurrent_requests: 3  # 👈 进一步降低并发
  temperature: 0.3
  top_p: 0.9
  strategy:
    type: "default"
  # 👈 添加以下配置
  community_prop: 0.15  # 社区选择比例
  min_community_size: 2  # 最小社区大小

### ==================== 社区分层配置（新增）====================
communities:
  resolution: 0.8  # 控制社区粒度
  max_cluster_size: 10
  use_lcc: true
  seed: 3735928559
  hierarchical_community_mode: "default"  # 👈 新增

snapshots:
  graphml: false
  embeddings: false
  raw_graph: false

### ==================== 查询配置 ====================
local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/local_search_system_prompt.txt"
  text_unit_prop: 0.5
  community_prop: 0.15
  conversation_history_max_turns: 5
  top_k_entities: 10
  top_k_relationships: 10
  max_context_tokens: 12000

global_search:
  completion_model_id: default_completion_model
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
  knowledge_prompt: "prompts/global_search_knowledge_system_prompt.txt"
  max_context_tokens: 12000
  data_max_tokens: 12000
  map_max_length: 1000
  reduce_max_length: 2000

drift_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/drift_search_system_prompt.txt"
  reduce_prompt: "prompts/drift_search_reduce_prompt.txt"
  data_max_tokens: 12000
  reduce_max_tokens: null
  reduce_temperature: 0
  concurrency: 32

basic_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/basic_search_system_prompt.txt"
  k: 10
  max_context_tokens: 12000