<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震知识智能问答</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <circle cx="12" cy="12" r="9"/>
                            <path d="M12 5v8l5 3"/>
                        </svg>
                    </div>
                    <div class="logo-text">
                        <span class="logo-title">地震知识助手</span>
                        <span class="logo-subtitle">Seismic Knowledge AI</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-actions">
                <button class="btn-new-chat" onclick="clearChat()">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                        <path d="M8 2v12M2 8h12"/>
                    </svg>
                    新对话
                </button>
            </div>

            <div class="sidebar-status">
                <div class="status-item" id="status-agent">
                    <span class="status-dot"></span>
                    <span class="status-label">Agent 服务</span>
                    <span class="status-badge">检查中</span>
                </div>
                <div class="status-item" id="status-model">
                    <span class="status-dot"></span>
                    <span class="status-label">模型服务</span>
                    <span class="status-badge">检查中</span>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="sidebar-info">
                    <span>Neo4j 知识图谱 + 网络搜索</span>
                    <span>© 2026 Earthquake Agent</span>
                </div>
            </div>
        </aside>

        <main class="main">
            <header class="top-bar">
                <button class="btn-sidebar-toggle" onclick="toggleSidebar()" title="切换侧边栏">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                        <path d="M3 5h14M3 10h14M3 15h14"/>
                    </svg>
                </button>
                <div class="top-bar-title">智能问答</div>
                <div class="top-bar-actions">
                    <button class="btn-generate-video" id="btn-generate-video" onclick="generateVideo()" title="根据对话历史生成视频">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="3,2 13,6 3,10 3,2"/>
                            <line x1="3" y1="10" x2="3" y2="14"/>
                            <line x1="7" y1="8" x2="13" y2="11"/>
                        </svg>
                        生成视频
                    </button>
                    <button class="btn-icon" onclick="clearChat()" title="清空对话">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 5h12M7 5V3h4v2M5 5v11a1 1 0 001 1h6a1 1 0 001-1V5"/>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="conversation" id="conversation">
                <div class="welcome-screen" id="welcome-screen">
                    <div class="welcome-brand">
                        <div class="welcome-brand-ring">
                            <svg width="36" height="36" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="24" cy="24" r="19"/>
                                <path d="M24 11v14l8 4" stroke-linecap="round"/>
                                <circle cx="24" cy="24" r="3" fill="currentColor"/>
                            </svg>
                        </div>
                    </div>
                    <h2>地震知识智能问答</h2>
                    <p>基于 Neo4j 知识图谱与网络实时搜索，为您提供专业的地震知识解答</p>
                    <div class="welcome-hints">
                        <button class="hint-chip" onclick="sendHint('地震发生时应该怎么做')">地震发生时应该怎么做</button>
                        <button class="hint-chip" onclick="sendHint('什么是地震预警系统')">什么是地震预警系统</button>
                        <button class="hint-chip" onclick="sendHint('汶川地震的基本信息')">汶川地震的基本信息</button>
                        <button class="hint-chip" onclick="sendHint('地震应急演练有哪些内容')">地震应急演练有哪些内容</button>
                    </div>
                </div>
            </div>

            <div class="input-section">
                <div class="input-container">
                    <textarea
                        class="input-field"
                        id="message-input"
                        placeholder="输入你想了解的地震相关问题…"
                        rows="1"
                    ></textarea>
                    <div class="input-actions">
                        <div class="input-hint">
                            <span>Enter 发送</span>
                            <span class="hint-sep">·</span>
                            <span>Shift + Enter 换行</span>
                        </div>
                        <div class="input-buttons">
                            <button class="btn-stop" id="btn-stop" onclick="stopGeneration()" style="display:none">
                                <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
                                    <rect x="2" y="2" width="10" height="10" rx="2"/>
                                </svg>
                                停止生成
                            </button>
                            <button class="btn-send" id="btn-send" onclick="sendMessage()">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round">
                                    <path d="M2 8l12-6-6 12-2-6-4-0z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
